name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows-x64:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.9.2"
          arch: win64_msvc2022_64
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --config Release --prefix package

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          windeployqt --release package\bin\HanoiTowersSlideshow.exe

      - name: Create archive
        shell: pwsh
        run: |
          Compress-Archive -Path package\* -DestinationPath HanoiTowersSlideshow-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HanoiTowersSlideshow-windows-x64
          path: HanoiTowersSlideshow-windows-x64.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: HanoiTowersSlideshow-windows-x64.zip

  linux-appimage-x64:
    name: Linux x86_64 AppImage
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build qt6-base-dev qt6-base-dev-tools qt6-tools-dev-tools libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 libxcb-cursor0 libfuse2 wget

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=/usr/lib/x86_64-linux-gnu/cmake/Qt6

      - name: Build
        run: cmake --build build

      - name: Install AppDir
        run: cmake --install build --prefix AppDir/usr

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          QMAKE: /usr/lib/qt6/bin/qmake6
        run: |
          export PATH="/usr/lib/qt6/bin:$PATH"
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
          appimage=$(find . -maxdepth 1 -type f -name "*.AppImage" ! -name "linuxdeploy*.AppImage" -print -quit)
          mv "$appimage" HanoiTowersSlideshow-linux-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HanoiTowersSlideshow-linux-x86_64
          path: HanoiTowersSlideshow-linux-x86_64.AppImage

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: HanoiTowersSlideshow-linux-x86_64.AppImage
